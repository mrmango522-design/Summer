<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生遊戲與實驗平台</title>
    <style>
        /* 基本樣式重置 */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; }
        body, html { height: 100%; background-color: #f4f7f6; }

        /* 登入介面樣式 */
        #login-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; background-color: #e0f7fa; padding: 20px;
        }
        .login-box {
            background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%; max-width: 400px; text-align: center;
        }
        .login-box .logo {
            max-width: 150px; height: auto; margin-bottom: 15px;
        }
        .login-box h2 { color: #00796b; margin-bottom: 5px; }
        .login-box .subtitle { color: #555; margin-bottom: 25px; font-size: 1.1em; font-weight: bold; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .input-group select, .input-group input {
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;
        }
        button {
            width: 100%; padding: 12px; background-color: #00796b; color: white;
            border: none; border-radius: 5px; font-size: 16px; cursor: pointer; transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background-color: #004d40; }

        /* 系統儀表板 (登入後) 樣式 */
        #dashboard-container { display: none; height: 100vh; flex-direction: row; }
        
        /* 左側選單 */
        #sidebar {
            width: 250px; background-color: #263238; color: white; display: flex; flex-direction: column;
        }
        .student-info { padding: 20px; background-color: #1a2327; text-align: center; }
        .menu-list { flex-grow: 1; overflow-y: auto; list-style-type: none; }
        .menu-list li {
            padding: 15px 20px; border-bottom: 1px solid #37474f; cursor: pointer; transition: 0.2s;
        }
        .menu-list li:hover, .menu-list li.active { background-color: #00796b; }
        
        /* 右側內容區 */
        #content-area { flex-grow: 1; display: flex; flex-direction: column; }
        iframe { width: 100%; height: 100%; border: none; background-color: white; }

        /* 手機版響應式設計 */
        @media (max-width: 768px) {
            #dashboard-container { flex-direction: column; }
            #sidebar { width: 100%; height: auto; flex-direction: column; }
            .menu-list { display: flex; flex-wrap: nowrap; overflow-x: auto; white-space: nowrap; }
            .menu-list li { border-bottom: none; border-right: 1px solid #37474f; flex: 0 0 auto; }
            #content-area { height: calc(100vh - 120px); } /* 扣除頂部選單高度 */
        }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="login-box">
            <img src="logo.jpg" alt="Logo" class="logo">
            
            <h2>學生登入</h2>
            <div class="subtitle">暑期STEM學科小遊戲</div>

            <div class="input-group">
                <label for="student-class">班別</label>
                <select id="student-class">
                    <option value="">請選擇班別...</option>
                    <option value="1A">1A</option>
                    <option value="2A">2A</option>
                    <option value="2B">2B</option>
                    <option value="3A">3A</option>
                    <option value="4A">4A</option>
                    <option value="5A">5A</option>
                    <option value="6A">6A</option>
                </select>
            </div>
            <div class="input-group">
                <label for="student-id">學號</label>
                <input type="number" id="student-id" placeholder="輸入學號 (例如: 12)">
            </div>
            <button onclick="login()">進入平台</button>
        </div>
    </div>

    <div id="dashboard-container">
        <div id="sidebar">
            <div class="student-info">
                <h3 id="display-student-info">學生資料</h3>
                <p id="display-level" style="font-size: 0.9em; color: #80cbc4; margin-top: 5px;"></p>
            </div>
            <ul class="menu-list" id="menu">
                </ul>
        </div>
        
        <div id="content-area">
            <iframe id="game-frame" src="about:blank"></iframe>
        </div>
    </div>

    <script>
        // 定義低小遊戲清單 (小一至小二)
        const juniorGames = [
            { name: "太空人行李遊戲", path: "space luggage/spaceitems.html" },
            { name: "太空垃圾捕獲遊戲", path: "spacecatch/spacecatch.html" }, // <-- 新增的低小遊戲
            { name: "實驗記錄表", path: "record.html" } 
        ];

        // 定義高小遊戲清單 (小三至小六)
        const seniorGames = [
            { name: "天韻載荷艙", path: "photo/photo.html" },
            { name: "無人機派送員", path: "drone/drone.html" },
            { name: "建橋大亨", path: "bridge/bridge.html" },
            { name: "城市電力拯救隊", path: "electricity/electricity.html" },
            { name: "實驗記錄表", path: "record.html" } 
        ];

        // 登入邏輯
        function login() {
            const studentClass = document.getElementById('student-class').value;
            const studentId = document.getElementById('student-id').value;

            if (!studentClass || !studentId) {
                alert("請選擇班別並輸入學號！");
                return;
            }

            // 1. 將資料存入 localStorage，讓後續遊戲內的 HTML 也能讀取
            localStorage.setItem('studentClass', studentClass);
            localStorage.setItem('studentId', studentId);

            // 2. 透過班別的第一個字判斷低小或高小 (1 或 2 為低小，3-6 為高小)
            const gradeLetter = studentClass.charAt(0); 
            const isJunior = (gradeLetter === '1' || gradeLetter === '2');
            
            const menuData = isJunior ? juniorGames : seniorGames;
            const levelText = isJunior ? "低小分頁" : "高小分頁";

            // 3. 更新介面學生資訊
            document.getElementById('display-student-info').innerText = `${studentClass} 班 - ${studentId} 號`;
            document.getElementById('display-level').innerText = levelText;

            // 4. 生成左側選單
            const menuElement = document.getElementById('menu');
            menuElement.innerHTML = ""; // 清空現有選單
            
            menuData.forEach((game, index) => {
                const li = document.createElement('li');
                li.innerText = game.name;
                li.onclick = () => loadGame(game.path, li);
                menuElement.appendChild(li);

                // 預設自動載入第一個項目
                if (index === 0) {
                    loadGame(game.path, li);
                }
            });

            // 5. 切換畫面：隱藏登入區，顯示主面板
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('dashboard-container').style.display = 'flex';
        }

        // 載入遊戲至 iframe
        function loadGame(path, clickedElement) {
            document.getElementById('game-frame').src = path;

            // 切換選單的 active 高亮狀態
            const listItems = document.querySelectorAll('.menu-list li');
            listItems.forEach(li => li.classList.remove('active'));
            if (clickedElement) {
                clickedElement.classList.add('active');
            }
        }
    </script>
</body>
</html>
